name: Generate Daily QR Codes

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Call daily code generation endpoint
        run: |
          curl -X POST https://attendance-roan-zeta.vercel.app/api/cron/generate-daily-codes \
            -H "Content-Type: application/json" \
            -f
